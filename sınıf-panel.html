<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatPortal | Sınıf Genel Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="text-indigo-600 font-bold text-sm flex items-center gap-1"><i class="fa-solid fa-house"></i> Ana Sayfaya Dön</a>
        <span id="panelUstEtiket" class="text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full">Sınıf Arşivi</span>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-grow space-y-6">
        
        <div class="bg-white p-6 rounded-2xl border shadow-sm border-slate-100">
            <h1 id="sinifAnaBaslik" class="text-2xl font-black text-slate-800 flex items-center gap-2">Yükleniyor...</h1>
            <p class="text-xs text-gray-400 mt-1">Bu sınıfa ait tüm aktif konu anlatımları ve yaprak test dökümanları aşağıda modüler olarak listelenmiştir.</p>
        </div>

        <div id="yukleniyorSinyali" class="text-center py-20 text-xs font-semibold text-slate-400">
            <i class="fa-solid fa-rotate animate-spin text-2xl text-indigo-600 mb-2 block mx-auto"></i> Sınıf döküman havuzu senkronize ediliyor...
        </div>

        <div id="panelIcerikKutusu" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col">
                <div class="bg-indigo-600 px-4 py-3 text-white font-bold text-sm flex justify-between items-center">
                    <span><i class="fa-solid fa-book-open-reader"></i> Konu Anlatım Belgeleri</span>
                    <span id="sayacAnlatim" class="text-[11px] bg-indigo-700 px-2 py-0.5 rounded-md">0 Dosya</span>
                </div>
                <div id="listeAnlatim" class="p-4 space-y-2 divide-y divide-slate-50 max-h-[500px] overflow-y-auto">
                    </div>
            </div>

            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col">
                <div class="bg-orange-500 px-4 py-3 text-white font-bold text-sm flex justify-between items-center">
                    <span><i class="fa-solid fa-file-signature"></i> Aktif Yaprak Testler</span>
                    <span id="sayacTest" class="text-[11px] bg-orange-600 px-2 py-0.5 rounded-md">0 Test</span>
                </div>
                <div id="listeTest" class="p-4 space-y-2 divide-y divide-slate-50 max-h-[500px] overflow-y-auto">
                    </div>
            </div>

        </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 py-3 text-center text-[10px] border-t border-slate-800">
        &copy; 2026 MatPortal Central Classroom Stream
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Konfigürasyonu
        const firebaseConfig = {
            apiKey: "AIzaSyBkCma7jbfyqzzSNdYKsLLT1WbZbMrIpxs",
            authDomain: "enesogrenci-91325.firebaseapp.com",
            databaseURL: "https://enesogrenci-91325-default-rtdb.firebaseio.com",
            projectId: "enesogrenci-91325",
            storageBucket: "enesogrenci-91325.firebasestorage.app",
            messagingSenderId: "364088274010",
            appId: "1:364088274010:web:98dc1daac0d094246cbc63",
            measurementId: "G-VSCX9PWJSM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // URL'den Hangi Sınıfın İstendiğini Çekiyoruz (?sinif=5)
        const urlParams = new URLSearchParams(window.location.search);
        const urlSinif = urlParams.get('sinif');

        // Sayfa Başlık Metinlerini Yönetelim
        const sinifEtiketMetni = urlSinif === 'ogretmen' ? 'Öğretmen Evrak Odası' : `${urlSinif}. Sınıf Genel Paneli`;
        document.getElementById('sinifAnaBaslik').innerHTML = `<i class="fa-solid fa-graduation-cap text-indigo-600"></i> ${sinifEtiketMetni}`;
        document.getElementById('panelUstEtiket').innerText = sinifEtiketMetni;

        // Canlı Veri Filtreleme Operasyonu
        onValue(ref(db, 'icerikler'), (snapshot) => {
            document.getElementById('yukleniyorSinyali').classList.add('hidden');
            document.getElementById('panelIcerikKutusu').classList.remove('hidden');

            const listeAnlatim = document.getElementById('listeAnlatim');
            const listeTest = document.getElementById('listeTest');
            
            // Panelleri Sıfırla
            listeAnlatim.innerHTML = "";
            listeTest.innerHTML = "";

            let countAnlatim = 0;
            let countTest = 0;

            const data = snapshot.val();
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const item = data[key];

                    // Sadece tıklanan sınıfa ait dökümanları içeri al
                    if(item.sinif === urlSinif) {
                        
                        // Kart Şablonu Tasarımı
                        const kartHTML = `
                            <div class="flex justify-between items-center py-2.5 transition hover:bg-slate-50">
                                <div class="truncate mr-2">
                                    <p class="text-xs font-bold text-slate-800 truncate"><i class="fa-regular fa-file-lines text-slate-400 mr-1.5"></i>${item.baslik}</p>
                                    <p class="text-[10px] text-gray-400 truncate mt-0.5">${item.detay || 'Açıklama belirtilmedi.'}</p>
                                </div>
                                <a href="icerik-detay.html?id=${key}" class="flex-shrink-0 bg-slate-900 hover:bg-indigo-600 text-white font-bold text-[10px] px-2.5 py-1 rounded transition">Görüntüle</a>
                            </div>`;

                        if(item.tur === 'anlatim') {
                            countAnlatim++;
                            listeAnlatim.innerHTML += kartHTML;
                        } else if(item.tur === 'test') {
                            countTest++;
                            listeTest.innerHTML += kartHTML;
                        }
                    }
                });
            }

            // Sayaçları ve Boş Durumları Güncelle
            document.getElementById('sayacAnlatim').innerText = `${countAnlatim} Dosya`;
            document.getElementById('sayacTest').innerText = `${countTest} Test`;

            if(countAnlatim === 0) listeAnlatim.innerHTML = `<p class="text-center py-8 text-gray-400 text-xs font-medium">Bu kategoriye ait konu anlatımı bulunmuyor.</p>`;
            if(countTest === 0) listeTest.innerHTML = `<p class="text-center py-8 text-gray-400 text-xs font-medium">Bu kategoriye ait test bulunmuyor.</p>`;
        });
    </script>
</body>
</html>
