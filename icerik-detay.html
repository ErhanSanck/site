<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatPortal | Materyal Detayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="text-indigo-600 font-bold text-xs flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> Geri Dön</a>
        <span class="text-xs font-semibold text-gray-400">Güvenli İndirme Bölgesi</span>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-12 w-full flex-grow">
        <div id="yukleniyor" class="text-center py-10 text-slate-400 text-xs font-medium">
            <i class="fa-solid fa-spinner animate-spin text-xl text-indigo-600 mb-1"></i> Dosya getiriliyor...
        </div>
        
        <div id="icerikKutusu" class="hidden bg-white p-6 rounded-2xl shadow-sm border space-y-4">
            <div class="flex justify-between items-center border-b pb-3">
                <h1 id="detayBaslik" class="text-lg font-bold text-slate-800"></h1>
                <span id="detayKategori" class="text-[10px] font-bold px-2 py-0.5 rounded bg-indigo-100 text-indigo-800 uppercase"></span>
            </div>
            
            <div class="space-y-1">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Açıklama</h3>
                <p id="detayMetin" class="text-xs text-slate-700 leading-relaxed bg-slate-50 p-3 rounded-xl border border-dashed border-slate-200"></p>
            </div>

            <div id="dosyaAlani" class="hidden bg-indigo-50 border border-indigo-100 p-3 rounded-xl flex justify-between items-center">
                <div class="flex items-center gap-2 truncate">
                    <i class="fa-solid fa-file-arrow-down text-red-500 text-2xl flex-shrink-0"></i>
                    <p id="dosyaAdi" class="text-xs font-bold text-slate-800 truncate max-w-[200px] md:max-w-xs"></p>
                </div>
                <a id="indirmeButonu" class="bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg transition"><i class="fa-solid fa-download"></i> Cihaza İndir</a>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 py-3 text-center text-[10px]">MatPortal Cloud Storage Gateway</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkCma7jbfyqzzSNdYKsLLT1WbZbMrIpxs",
            authDomain: "enesogrenci-91325.firebaseapp.com",
            databaseURL: "https://enesogrenci-91325-default-rtdb.firebaseio.com",
            projectId: "enesogrenci-91325",
            storageBucket: "enesogrenci-91325.firebasestorage.app",
            messagingSenderId: "364088274010",
            appId: "1:364088274010:web:98dc1daac0d094246cbc63",
            measurementId: "G-VSCX9PWJSM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const id = new URLSearchParams(window.location.search).get('id');

        if(id) {
            onValue(ref(db, 'icerikler/' + id), (snapshot) => {
                document.getElementById('yukleniyor').classList.add('hidden');
                const item = snapshot.val();
                
                if(item) {
                    document.getElementById('icerikKutusu').classList.remove('hidden');
                    document.getElementById('detayBaslik').innerText = item.baslik;
                    document.getElementById('detayKategori').innerText = item.sinif === 'ogretmen' ? 'Öğretmen Evrakı' : `${item.sinif}. Sınıf`;
                    document.getElementById('detayMetin').innerText = item.detay || 'Detay açıklaması bulunmuyor.';

                    if(item.dosya) {
                        document.getElementById('dosyaAlani').classList.remove('hidden');
                        document.getElementById('dosyaAdi').innerText = item.dosyaAdi || 'ekli_materyal';
                        
                        const b = document.getElementById('indirmeButonu');
                        b.href = item.dosya;
                        b.download = item.dosyaAdi || 'materyal';
                    }
                } else {
                    document.body.innerHTML = "<div class='text-center py-20 text-xs text-red-500 font-bold'>Doküman silinmiş.</div>";
                }
            });
        }
    </script>
</body>
</html>
